<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spice Garden | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="logo" href="index.html"><span class="logo-mark">SG</span> Spice Garden</a>
      <h1>Login</h1>
      <p class="muted">Welcome back. Order your favorites faster.</p>
      <form data-demo-form data-message="Login successful">
        <div class="form-group"><label>Email</label><input type="email" required placeholder="you@example.com"></div>
        <div class="form-group"><label>Password</label><input type="password" required placeholder="Enter password"></div>
        <a class="muted" href="#">Forgot Password?</a>
        <div class="form-actions">
          <button class="submit-btn" type="submit">Login</button>
          <button class="btn-outline" type="button">Continue with Google</button>
          <p>New here? <a class="active-link" href="signup.html">Create account</a></p>
        </div>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
