<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spice Garden | Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="logo" href="index.html"><span class="logo-mark">SG</span> Spice Garden</a>
      <h1>Sign Up</h1>
      <p class="muted">Create an account for quick checkout.</p>
      <form data-demo-form data-message="Signup successful">
        <div class="form-group"><label>Name</label><input required placeholder="Full name"></div>
        <div class="form-group"><label>Email</label><input type="email" required placeholder="you@example.com"></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" required placeholder="+91 98765 43210"></div>
        <div class="form-group"><label>Password</label><input type="password" required placeholder="Create password"></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" required placeholder="Confirm password"></div>
        <div class="form-actions">
          <button class="submit-btn" type="submit">Sign Up</button>
          <p>Already have an account? <a class="active-link" href="login.html">Login</a></p>
        </div>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
