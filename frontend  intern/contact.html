<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spice Garden | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar"><div class="container nav-inner"><a class="logo" href="index.html"><span class="logo-mark">SG</span> Spice Garden</a><nav class="nav-links"><a href="dashboard.html">Dashboard</a><a href="index.html">Home</a><a href="menu.html">Menu</a><a href="about.html">About</a><a class="active-link" href="contact.html">Contact</a><a href="cart.html">Cart (<span data-cart-count>0</span>)</a></nav></div></header>
  <main>
    <section class="page-hero"><div class="container"><h1>Contact Us</h1><p>Questions, catering requests, or feedback? Send us a message.</p></div></section>
    <section class="section"><div class="container contact-layout">
      <form class="summary-box" data-demo-form data-message="Message sent successfully">
        <h2>Send Message</h2>
        <div class="form-group"><label>Name</label><input required placeholder="Your name"></div>
        <div class="form-group"><label>Email</label><input type="email" required placeholder="you@example.com"></div>
        <div class="form-group"><label>Message</label><textarea required placeholder="Write your message"></textarea></div>
        <button class="submit-btn" type="submit">Send</button>
      </form>
      <aside class="summary-box">
        <h2>Find Spice Garden</h2>
        <div class="map">Embedded Map Placeholder</div>
        <p>MG Road, Bengaluru<br>+91 98765 43210</p>
        <div class="socials"><a href="#">IG</a><a href="#">FB</a><a href="#">WA</a></div>
      </aside>
    </div></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
