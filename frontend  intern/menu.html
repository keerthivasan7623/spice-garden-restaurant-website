<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spice Garden | Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar"><div class="container nav-inner"><a class="logo" href="index.html"><span class="logo-mark">SG</span> Spice Garden</a><nav class="nav-links"><a href="dashboard.html">Dashboard</a><a href="index.html">Home</a><a class="active-link" href="menu.html">Menu</a><a href="food-details.html">Food Details</a><a href="cart.html">Cart (<span data-cart-count>0</span>)</a><a href="admin.html">Admin</a></nav></div></header>
  <main>
    <section class="page-hero"><div class="container"><h1>Our Menu</h1><p>Browse fresh South Indian dishes by category, search, and add your choices to cart.</p></div></section>
    <section class="section"><div class="container">
      <div class="toolbar">
        <input id="menuSearch" class="search" placeholder="Search food...">
        <select id="menuFilter"><option>All</option><option>Starters</option><option>Main Course</option><option>Breads</option><option>Desserts</option><option>Drinks</option></select>
      </div>
      <div class="tabs">
        <button class="tab active" data-category="All">All</button>
        <button class="tab" data-category="Starters">Starters</button>
        <button class="tab" data-category="Main Course">Main Course</button>
        <button class="tab" data-category="Breads">Breads</button>
        <button class="tab" data-category="Desserts">Desserts</button>
        <button class="tab" data-category="Drinks">Drinks</button>
      </div>
      <div id="menuGrid" class="grid grid-4"></div>
    </div></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
