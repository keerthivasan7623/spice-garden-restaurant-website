<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spice Garden | Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar"><div class="container nav-inner"><a class="logo" href="index.html"><span class="logo-mark">SG</span> Spice Garden</a><nav class="nav-links"><a href="dashboard.html">Dashboard</a><a href="index.html">Home</a><a href="menu.html">Menu</a><a class="active-link" href="cart.html">Cart (<span data-cart-count>0</span>)</a><a href="checkout.html">Checkout</a></nav></div></header>
  <main>
    <section class="page-hero"><div class="container"><h1>Your Cart</h1><p>Review selected dishes and proceed to checkout.</p></div></section>
    <section class="section"><div class="container checkout-layout">
      <div id="cartList"></div>
      <aside class="summary-box">
        <h2>Bill Summary</h2>
        <div class="summary-row"><span>Subtotal</span><strong data-subtotal>Rs. 0</strong></div>
        <div class="summary-row"><span>Delivery</span><strong data-delivery>Rs. 0</strong></div>
        <div class="summary-row total"><span>Total</span><strong data-total>Rs. 0</strong></div>
        <a class="btn btn-primary" href="checkout.html">Proceed to Checkout</a>
      </aside>
    </div></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
